<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsFilter — Đọc tin theo ý bạn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     ✏️  TYPOGRAPHY — chỉnh tại đây, áp dụng toàn app
     ============================================================ */
  :root {
    /* Font families */
    --serif: 'Roboto Slab', Georgia, serif;   /* tiêu đề bài */
    --sans:  'Roboto', system-ui, sans-serif; /* body, UI    */

    /* Card sizes */
    --title-size: 25px;   /* .card-title  */
    --desc-size:  20px;   /* .card-desc   */

    /* UI sizes (sidebar, badge, button…) — thường không cần đổi */
    --ui-sm:  11px;
    --ui-md:  13px;
    --ui-lg:  15px;
  }
  /* ============================================================ */

  :root {
    --ink: #0f0e0c;
    --paper: #f5f2ec;
    --paper2: #ede9e0;
    --accent: #c84b2f;
    --accent2: #2d6a4f;
    --muted: #7a7567;
    --border: #d4cfc4;
    --card: #faf8f4;
    --r: 6px;
  }
  [data-theme="dark"] {
    --ink: #e8e4db;
    --paper: #181714;
    --paper2: #201f1b;
    --accent: #e8654a;
    --accent2: #4caf7d;
    --muted: #8a8679;
    --border: #2e2d29;
    --card: #22211e;
  }
  body { transition: background .25s, color .25s; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--paper);
    border-bottom: 1.5px solid var(--ink);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; height: 56px;
  }
  .logo {
    font-family: var(--serif);
    font-size: 22px; letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .search-bar {
    flex: 1; position: relative;
    max-width: 420px;
  }
  .search-bar input {
    width: 100%; padding: 7px 12px 7px 36px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    font-family: var(--sans); font-size: 14px;
    color: var(--ink); outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .4; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px;
    border: 1.5px solid var(--ink);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; background: transparent; color: var(--ink);
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #a33a21; border-color: #a33a21; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }

  /* ── LAYOUT ── */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 56px); }

  /* ── SIDEBAR ── */
  aside {
    border-right: 1.5px solid var(--ink);
    padding: 12px 10px;
    position: sticky; top: 56px; height: calc(100vh - 56px);
    overflow-y: auto;
    background: var(--paper2);
    min-width: 0;
  }
  .sidebar-section { margin-bottom: 28px; }
  .sidebar-title {
    font-size: 10px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }

  /* Sources list */
  .source-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border-radius: var(--r);
    cursor: pointer; font-size: 13px;
    transition: background .12s;
    user-select: none;
  }
  .source-item:hover { background: var(--border); }
  .source-item.active { background: var(--ink); color: var(--paper); }
  .source-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-right: 8px; flex-shrink: 0;
  }
  .source-left { display: flex; align-items: center; }
  .source-count {
    font-size: 11px; opacity: .5;
    background: rgba(0,0,0,.08); border-radius: 10px;
    padding: 1px 6px;
  }

  /* Add source form */
  .add-source { margin-top: 8px; }
  .add-source input {
    width: 100%; padding: 7px 10px; box-sizing: border-box;
    border: 1.5px solid var(--border); border-radius: var(--r);
    font-family: var(--sans); font-size: 13px;
    background: var(--card); color: var(--ink); outline: none;
    margin-bottom: 6px; min-width: 0;
    transition: border-color .2s;
  }
  .add-source input:focus { border-color: var(--accent); }

  /* Keyword filter */
  .keyword-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .keyword-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 12px;
    background: #ffddcc; color: #7a2a10;
    font-size: 12px; font-weight: 500;
  }
  .keyword-tag .rm {
    cursor: pointer; font-size: 14px; line-height: 1;
    opacity: .6; transition: opacity .15s;
  }
  .keyword-tag .rm:hover { opacity: 1; }
  .kw-input-row { display: flex; gap: 6px; }
  .kw-input-row input {
    flex: 1; padding: 7px 10px; box-sizing: border-box; min-width: 0;
    border: 1.5px solid var(--border); border-radius: var(--r);
    font-family: var(--sans); font-size: 13px;
    background: var(--card); color: var(--ink); outline: none;
    transition: border-color .2s;
  }
  .kw-input-row input:focus { border-color: var(--accent); }

  .filter-stats {
    font-size: 12px; color: var(--muted);
    padding: 8px; border-radius: var(--r);
    background: var(--card); border: 1px solid var(--border);
    text-align: center; margin-top: 8px;
  }
  .filter-stats strong { color: var(--accent); }

  /* ── MAIN FEED ── */
  main { padding: 0; overflow: hidden; }

  .feed-header {
    padding: 16px 28px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .feed-title { font-family: var(--serif); font-size: 20px; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .sort-select {
    padding: 6px 10px; border: 1.5px solid var(--border);
    border-radius: 20px; font-family: var(--sans); font-size: 13px;
    background: var(--card); color: var(--ink); cursor: pointer; outline: none;
  }

  /* News grid */
  #feed {
    padding: 20px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    align-content: start;
    max-height: calc(100vh - 130px);
    overflow-y: auto;
  }

  /* Article card */
  .article-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color .2s, transform .15s, box-shadow .15s;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .article-card:hover {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,.08);
  }
  .card-img {
    width: 100%; height: 160px; object-fit: cover;
    border-bottom: 1px solid var(--border);
    display: block;
    background: var(--paper2);
  }
  .card-img-placeholder {
    width: 100%; height: 120px;
    background: var(--paper2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--border);
  }
  .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-source-row { display: flex; align-items: center; justify-content: space-between; }
  .card-source-badge {
    font-size: 10px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; padding: 2px 8px;
    border-radius: 10px; border: 1px solid var(--border);
    color: var(--muted);
  }
  .card-date { font-size: 11px; color: var(--muted); }
  .card-title {
    font-family: var(--serif);
    font-size: var(--title-size); line-height: 1.3;
    color: var(--ink);
  }
  .card-desc {
    font-size: var(--desc-size); color: var(--muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex; gap: 6px; align-items: center;
    padding: 10px 16px 12px;
    border-top: 1px solid var(--border);
  }
  .card-footer a {
    font-size: 12px; font-weight: 500;
    color: var(--accent); text-decoration: none;
    flex: 1;
  }
  .card-footer a:hover { text-decoration: underline; }
  .save-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
    font-size: 14px;
  }
  .save-btn:hover, .save-btn.saved { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* Translate */
  .translate-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
    font-size: 13px; flex-shrink: 0;
  }
  .translate-btn:hover { background: var(--paper2); border-color: var(--ink); }
  .translate-btn.translating { animation: spin .8s linear infinite; }
  .card-translated {
    font-size: var(--desc-size); color: var(--ink);
    line-height: 1.55; margin-top: 6px;
    padding: 8px 10px;
    background: var(--paper2);
    border-left: 3px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .card-translated .tl-label {
    font-size: 10px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; color: var(--muted);
    display: block; margin-bottom: 4px;
  }

  /* Highlight match */
  .highlight { background: #ffe0a0; border-radius: 2px; padding: 0 1px; }

  /* States */
  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h3 { font-family: var(--serif); font-size: 22px; margin-bottom: 8px; color: var(--ink); }
  .loading-spinner {
    grid-column: 1/-1;
    display: flex; justify-content: center; padding: 40px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    z-index: 9999;
  }
  #toast.show { opacity: 1; }

  /* Saved view */
  .view-tabs {
    display: flex; gap: 0;
    border-bottom: 1.5px solid var(--ink);
  }
  .view-tab {
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    border-bottom: 2px solid transparent; margin-bottom: -1.5px;
    color: var(--muted); transition: color .15s;
    font-family: var(--sans);
  }
  .view-tab.active { color: var(--ink); border-bottom-color: var(--accent); }

  /* ── ACCORDION ── */
  .accordion { margin-bottom: 6px; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; min-width: 0; }
  .accordion-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px;
    cursor: pointer; user-select: none;
    background: var(--card);
    transition: background .15s;
    min-width: 0;
  }
  .accordion-header:hover { background: var(--border); }
  .accordion-header-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; overflow: hidden; }
  .accordion-icon { font-size: 14px; flex-shrink: 0; }
  .accordion-label {
    font-size: 12px; font-weight: 500; letter-spacing: .4px;
    color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .accordion-badge {
    font-size: 10px; background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 6px; font-weight: 500;
    flex-shrink: 0;
  }
  .accordion-chevron {
    width: 16px; height: 16px; flex-shrink: 0;
    transition: transform .22s ease;
    color: var(--muted);
  }
  .accordion.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease, padding .3s ease;
    background: var(--paper2);
    padding: 0 10px;
    box-sizing: border-box;
    width: 100%;
  }
  .accordion.open .accordion-body {
    max-height: 800px;
    padding: 10px 10px 12px;
  }
  /* Mọi input/button trong accordion body chiếm full width, không tràn */
  .accordion-body input[type="text"] {
    width: 100%; box-sizing: border-box; min-width: 0;
  }
  .accordion-body .btn { white-space: nowrap; min-width: 0; box-sizing: border-box; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: border-color .2s, background .2s, transform .2s;
    line-height: 1;
  }
  .theme-toggle:hover { border-color: var(--ink); transform: rotate(20deg); }

  /* ── SCROLL TO TOP ── */
  #scroll-top {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    opacity: 0; pointer-events: none;
    transform: translateY(10px);
    transition: opacity .25s, transform .25s;
  }
  #scroll-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  #scroll-top:hover { background: var(--accent); }

  /* Responsive */
  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr; }
    aside {
      position: static; height: auto;
      border-right: none; border-bottom: 1.5px solid var(--ink);
      padding: 10px 8px;
    }
    #feed { max-height: none; }
    .search-bar { max-width: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">News<span>Filter</span></div>
  <div class="search-bar">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Tìm kiếm bài viết…" oninput="renderFeed()">
  </div>
  <button class="btn primary" onclick="fetchAll(true)">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>
    Tải lại
  </button>
  <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Đổi giao diện sáng/tối">🌙</button>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside>

    <!-- Accordion: Nguồn báo -->
    <div class="accordion open" id="acc-sources">
      <div class="accordion-header" onclick="toggleAccordion('acc-sources')">
        <div class="accordion-header-left">
          <span class="accordion-icon">📡</span>
          <span class="accordion-label">Nguồn báo</span>
          <span class="accordion-badge" id="acc-src-badge">0</span>
        </div>
        <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="accordion-body">
        <div id="source-list"></div>
        <div class="add-source" style="margin-top:10px">
          <input type="text" id="new-source-name" placeholder="Tên nguồn (VD: VnExpress)">
          <input type="text" id="new-source-url" placeholder="RSS URL…">
          <button class="btn sm" style="width:100%;justify-content:center;margin-top:4px" onclick="addSource()">+ Thêm nguồn</button>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:10px 0">
        <p style="font-size:11px;color:var(--muted);margin-bottom:6px">Xuất/nhập toàn bộ nguồn báo + từ khoá</p>
        <div style="display:flex;gap:6px">
          <button class="btn sm" style="flex:1;justify-content:center" onclick="exportAll()">📤 Xuất</button>
          <button class="btn sm" style="flex:1;justify-content:center" onclick="document.getElementById('import-file-input').click()">📥 Nhập</button>
          <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="importAll(event);this.value=''">
        </div>
      </div>
    </div>

    <!-- Accordion: Chặn từ khoá -->
    <div class="accordion open" id="acc-keywords">
      <div class="accordion-header" onclick="toggleAccordion('acc-keywords')">
        <div class="accordion-header-left">
          <span class="accordion-icon">🚫</span>
          <span class="accordion-label">Chặn từ khoá</span>
          <span class="accordion-badge" id="acc-kw-badge" style="display:none">0</span>
        </div>
        <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="accordion-body">
        <div class="keyword-tags" id="kw-tags"></div>
        <div class="kw-input-row">
          <input type="text" id="kw-input" placeholder="Nhập từ khoá…" onkeydown="if(event.key==='Enter')addKeyword()">
          <button class="btn sm" onclick="addKeyword()">+</button>
        </div>
        <div class="filter-stats" id="filter-stats">Chưa có từ khoá bị chặn</div>
      </div>
    </div>

    <!-- Accordion: Cloudflare Worker -->
    <div class="accordion" id="acc-worker">
      <div class="accordion-header" onclick="toggleAccordion('acc-worker')">
        <div class="accordion-header-left">
          <span class="accordion-icon">⚙️</span>
          <span class="accordion-label">Cloudflare Worker</span>
          <span id="worker-status-badge" style="font-size:10px;padding:1px 6px;border-radius:10px;background:var(--border);color:var(--muted);flex-shrink:0">chưa cài</span>
        </div>
        <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="accordion-body">
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;word-break:break-word">Dán URL Worker để fetch báo VN không bị chặn. <a href="#" onclick="showWorkerHelp();return false;" style="color:var(--accent)">Hướng dẫn →</a></p>
        <input type="text" id="worker-url-input" placeholder="https://your-worker.workers.dev"
          style="width:100%;box-sizing:border-box;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:12px;background:var(--card);color:var(--ink);outline:none;margin-bottom:6px;min-width:0">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn sm" style="flex:1;justify-content:center;min-width:52px" onclick="saveWorkerUrl()">💾 Lưu</button>
          <button class="btn sm" style="flex:1;justify-content:center;min-width:52px" onclick="testWorker()">🔍 Test</button>
          <button class="btn sm" style="justify-content:center;color:var(--accent);border-color:var(--accent)" onclick="clearWorkerUrl()">✕</button>
        </div>
        <div id="worker-test-result" style="font-size:11px;margin-top:6px;display:none;padding:6px 8px;border-radius:4px;line-height:1.4;word-break:break-word"></div>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main>
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('feed', this)">📰 Tất cả tin</button>
      <button class="view-tab" onclick="switchView('saved', this)">🔖 Đã lưu</button>
    </div>
    <div class="feed-header">
      <div class="feed-title" id="feed-title">Tin mới nhất</div>
      <div class="controls">
        <select class="sort-select" id="sort-select" onchange="renderFeed()">
          <option value="date">Mới nhất</option>
          <option value="source">Theo nguồn</option>
        </select>
      </div>
    </div>
    <div id="feed"></div>
  </main>
</div>

<div id="toast"></div>

<button id="scroll-top" onclick="scrollToTop()" title="Lên đầu trang">
  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<script>
// ── DEFAULT SOURCES ──
const DEFAULT_SOURCES = [
  { id: 's1', name: 'VnExpress', url: 'https://vnexpress.net/rss/tin-moi-nhat.rss', color: '#e84118', enabled: true },
  { id: 's2', name: 'Tuổi Trẻ', url: 'https://tuoitre.vn/rss/tin-moi-nhat.rss', color: '#0097e6', enabled: true },
  { id: 's3', name: 'Thanh Niên', url: 'https://thanhnien.vn/rss/home.rss', color: '#27ae60', enabled: true },
  { id: 's4', name: 'BBC Việt', url: 'https://feeds.bbci.co.uk/vietnamese/rss.xml', color: '#c0392b', enabled: true },
  { id: 's5', name: 'Reuters', url: 'https://feeds.reuters.com/reuters/topNews', color: '#e67e22', enabled: false },
];

// ── STATE ──
let state = {
  sources: JSON.parse(localStorage.getItem('nf_sources') || 'null') || DEFAULT_SOURCES,
  keywords: JSON.parse(localStorage.getItem('nf_keywords') || '[]'),
  articles: [],
  saved: JSON.parse(localStorage.getItem('nf_saved') || '[]'),
  currentView: 'feed',
  activeSource: 'all',
  blockedCount: 0,
};

function save() {
  localStorage.setItem('nf_sources', JSON.stringify(state.sources));
  localStorage.setItem('nf_keywords', JSON.stringify(state.keywords));
  localStorage.setItem('nf_saved', JSON.stringify(state.saved));
}

// ── FETCH CONFIG ──
const CACHE_TTL = 5 * 60 * 1000; // 5 phút
const FETCH_TIMEOUT = 12000;      // 12 giây per source (tăng từ 8s để giảm false timeout)

// rss2json: trả JSON sẵn, nhanh hơn allorigins nhiều
// ── CACHE ──
function cacheKey(sourceId) { return `nf_cache_${sourceId}`; }

function readCache(sourceId) {
  try {
    const raw = localStorage.getItem(cacheKey(sourceId));
    if (!raw) return null;
    const { ts, articles } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return articles;
  } catch { return null; }
}

function writeCache(sourceId, articles) {
  try {
    localStorage.setItem(cacheKey(sourceId), JSON.stringify({ ts: Date.now(), articles }));
  } catch {}
}

function readStaleCache(sourceId) {
  try {
    const raw = localStorage.getItem(cacheKey(sourceId));
    return raw ? JSON.parse(raw).articles : null;
  } catch { return null; }
}

// ── WORKER SETTINGS ──
function getWorkerUrl() {
  return (localStorage.getItem('nf_worker_url') || '').trim().replace(/\/$/, '');
}

function saveWorkerUrl() {
  const raw = document.getElementById('worker-url-input').value.trim().replace(/\/$/, '');
  if (!raw) { toast('Vui lòng nhập URL Worker'); return; }
  try { new URL(raw); } catch { toast('URL không hợp lệ'); return; }
  localStorage.setItem('nf_worker_url', raw);
  // xoá cache proxy để fetch lại qua worker
  Object.keys(localStorage).filter(k => k.startsWith('nf_cache_') || k === 'nf_proxy_pref')
    .forEach(k => localStorage.removeItem(k));
  updateWorkerBadge();
  toast('✓ Đã lưu Worker URL — đang tải lại…');
  setTimeout(() => fetchAll(true), 500);
}

function clearWorkerUrl() {
  localStorage.removeItem('nf_worker_url');
  document.getElementById('worker-url-input').value = '';
  updateWorkerBadge();
  toast('Đã xoá Worker URL');
}

async function testWorker() {
  const url = getWorkerUrl();
  const resultEl = document.getElementById('worker-test-result');
  resultEl.style.display = 'block';
  if (!url) {
    resultEl.style.background = '#fff3cd'; resultEl.style.color = '#856404';
    resultEl.textContent = '⚠ Chưa nhập URL Worker'; return;
  }
  resultEl.style.background = 'var(--paper2)'; resultEl.style.color = 'var(--muted)';
  resultEl.textContent = '⟳ Đang test…';
  try {
    const testRss = 'https://vnexpress.net/rss/tin-moi-nhat.rss';
    const res = await fetchWithTimeout(`${url}/proxy?url=${encodeURIComponent(testRss)}`, 10000);
    const json = await res.json();
    if (json.status === 'ok' && json.items?.length > 0) {
      resultEl.style.background = '#d1e7dd'; resultEl.style.color = '#0a3622';
      resultEl.textContent = `✓ Hoạt động! Lấy được ${json.items.length} bài từ VnExpress.`;
      updateWorkerBadge(true);
    } else {
      resultEl.style.background = '#f8d7da'; resultEl.style.color = '#58151c';
      resultEl.textContent = `✕ Worker phản hồi nhưng không có dữ liệu: ${JSON.stringify(json).slice(0,80)}`;
    }
  } catch (e) {
    resultEl.style.background = '#f8d7da'; resultEl.style.color = '#58151c';
    resultEl.textContent = `✕ Lỗi kết nối: ${e.message}`;
  }
}

function updateWorkerBadge(ok) {
  const badge = document.getElementById('worker-status-badge');
  const url = getWorkerUrl();
  const input = document.getElementById('worker-url-input');
  if (input && url) input.value = url;
  if (!badge) return;
  if (!url) {
    badge.style.background = 'var(--border)'; badge.style.color = 'var(--muted)';
    badge.textContent = 'chưa cài'; return;
  }
  if (ok === true) {
    badge.style.background = '#d1e7dd'; badge.style.color = '#0a3622';
    badge.textContent = 'hoạt động';
  } else {
    badge.style.background = '#cfe2ff'; badge.style.color = '#084298';
    badge.textContent = 'đã cài';
  }
}

function showWorkerHelp() {
  toast('Xem file DEPLOY.md đã tải về cùng app để biết cách deploy Worker miễn phí!');
}

// ── PROXY CHAIN ──
const proxyPreference = JSON.parse(localStorage.getItem('nf_proxy_pref') || '{}');

// Tạo ID ổn định từ link (không dùng Date.now() để tránh duplicate)
function stableId(sourceId, link) {
  let h = 0;
  const s = sourceId + '|' + link;
  for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
  return sourceId + '_' + Math.abs(h).toString(36);
}

// Parse Worker JSON response
function parseWorkerResponse(json, source) {
  if (json.status !== 'ok' || !Array.isArray(json.items)) return null;
  return json.items.map(item => ({
    id: stableId(source.id, item.link?.trim() || item.title || ''),
    sourceId: source.id, sourceName: source.name, sourceColor: source.color,
    title: item.title?.trim() || '',
    link:  item.link?.trim()  || '',
    desc:  item.desc  || '',
    pubDate: item.pubDate ? new Date(item.pubDate) : new Date(),
    img: item.img || '',
    saved: false,
  })).filter(a => a.title && a.link);
}

// Parse rss2json.com JSON
function parseRss2jsonResponse(json, source) {
  if (json.status !== 'ok' || !Array.isArray(json.items)) return null;
  return json.items.slice(0, 20).map(item => {
    let img = item.thumbnail || item.enclosure?.link || '';
    if (!img) {
      const html = item.description || item.content || '';
      const m = html.match(/<img[^>]+src=["']([^"']+)/i);
      if (m) img = m[1];
    }
    return {
      id: stableId(source.id, item.link?.trim() || item.title || ''),
      sourceId: source.id, sourceName: source.name, sourceColor: source.color,
      title: item.title?.trim() || '',
      link:  item.link?.trim()  || '',
      desc:  (item.description || item.content || '').replace(/<[^>]+>/g,'').trim().slice(0,300),
      pubDate: item.pubDate ? new Date(item.pubDate) : new Date(),
      img, saved: false,
    };
  }).filter(a => a.title && a.link);
}

// ── FETCH WITH TIMEOUT ──
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

// ── FETCH WITH RETRY (1 lần retry sau 1s khi gặp lỗi mạng tạm thời) ──
async function fetchWithRetry(url, ms, retries = 1) {
  for (let i = 0; i <= retries; i++) {
    try {
      const res = await fetchWithTimeout(url, ms);
      return res;
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 1000));
    }
  }
}

// ── FETCH ONE SOURCE ──
async function fetchSource(source) {
  setSourceStatus(source.id, 'loading');
  const workerBase = getWorkerUrl();

  // ── 1. Cloudflare Worker (ưu tiên tuyệt đối nếu đã cài) ──
  if (workerBase) {
    try {
      const url = `${workerBase}/proxy?url=${encodeURIComponent(source.url)}`;
      const res = await fetchWithRetry(url, FETCH_TIMEOUT);
      if (res.ok) {
        const json = await res.json();
        const articles = parseWorkerResponse(json, source);
        if (articles && articles.length > 0) {
          writeCache(source.id, articles);
          setSourceStatus(source.id, 'ok');
          updateWorkerBadge(true);
          return articles;
        }
      }
    } catch {}
  }

  // Danh sách proxy XML thử lần lượt
  const xmlProxies = [
    // allorigins — ổn định, hỗ trợ CORS tốt
    async () => {
      const url = `https://api.allorigins.win/get?url=${encodeURIComponent(source.url)}&timestamp=${Date.now()}`;
      const res = await fetchWithRetry(url, FETCH_TIMEOUT);
      if (!res.ok) return null;
      const json = await res.json();
      return json.contents ? parseXml(json.contents, source) : null;
    },
    // corsproxy.io
    async () => {
      const url = `https://corsproxy.io/?url=${encodeURIComponent(source.url)}`;
      const res = await fetchWithRetry(url, FETCH_TIMEOUT);
      if (!res.ok) return null;
      return parseXml(await res.text(), source);
    },
    // thingproxy — proxy dự phòng
    async () => {
      const url = `https://thingproxy.freeboard.io/fetch/${source.url}`;
      const res = await fetchWithRetry(url, FETCH_TIMEOUT);
      if (!res.ok) return null;
      return parseXml(await res.text(), source);
    },
    // cors.bridged.cc — proxy dự phòng thứ 3
    async () => {
      const url = `https://cors.bridged.cc/${source.url}`;
      const res = await fetchWithRetry(url, FETCH_TIMEOUT);
      if (!res.ok) return null;
      return parseXml(await res.text(), source);
    },
  ];

  // ── 2. rss2json.com (nhanh, JSON sẵn, nhưng rate-limit free tier) ──
  try {
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=20`;
    const res = await fetchWithRetry(url, FETCH_TIMEOUT);
    if (res.ok) {
      const json = await res.json();
      // Nếu bị rate-limit (status: "error") → bỏ qua, thử proxy XML
      if (json.status === 'ok') {
        const articles = parseRss2jsonResponse(json, source);
        if (articles && articles.length > 0) {
          writeCache(source.id, articles);
          setSourceStatus(source.id, 'ok');
          return articles;
        }
      }
    }
  } catch {}

  // ── 3-6. Thử lần lượt các XML proxy ──
  for (const proxyFn of xmlProxies) {
    try {
      const articles = await proxyFn();
      if (articles && articles.length > 0) {
        writeCache(source.id, articles);
        setSourceStatus(source.id, 'ok');
        return articles;
      }
    } catch {}
  }

  // ── Cuối cùng: Stale cache ──
  setSourceStatus(source.id, 'error');
  return readStaleCache(source.id) || [];
}

// ── XML PARSER (dùng cho allorigins / corsproxy) ──
function parseXml(xmlText, source) {
  if (!xmlText) return [];
  try {
    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    if (doc.querySelector('parsererror')) {
      // Thử parse lại với text/html nếu text/xml thất bại
      const doc2 = new DOMParser().parseFromString(xmlText, 'text/html');
      if (!doc2.querySelector('item')) return [];
      return parseXmlDoc(doc2, source);
    }
    return parseXmlDoc(doc, source);
  } catch { return []; }
}

function parseXmlDoc(doc, source) {
  return [...doc.querySelectorAll('item')].slice(0, 20).map(item => {
    const title = item.querySelector('title')?.textContent?.trim() || '';
    // Một số feed RSS dùng <link> là CDATA hoặc attribute, cần lấy đúng
    let link = '';
    const linkEl = item.querySelector('link');
    if (linkEl) {
      link = linkEl.textContent?.trim() || linkEl.getAttribute('href') || '';
    }
    if (!link) {
      const atomLink = item.querySelector('[rel="alternate"]');
      link = atomLink?.getAttribute('href') || '';
    }
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || 
                    item.querySelector('updated')?.textContent?.trim() || '';
    const rawDesc = item.querySelector('description')?.textContent || 
                    item.querySelector('summary')?.textContent || 
                    item.querySelector('content')?.textContent || '';
    const desc = rawDesc.replace(/<[^>]+>/g,'').trim().slice(0, 300);
    const img  = extractImageFromItem(item, rawDesc);
    return {
      id: stableId(source.id, link || title),
      sourceId: source.id, sourceName: source.name, sourceColor: source.color,
      title, link, desc,
      pubDate: pubDate ? new Date(pubDate) : new Date(),
      img, saved: false,
    };
  }).filter(a => a.title && a.link);
}

function extractImageFromItem(item, rawDesc = '') {
  // 1. <enclosure type="image/...">
  const enc = item.querySelector('enclosure');
  if (enc?.getAttribute('url') && (enc.getAttribute('type') || '').includes('image'))
    return enc.getAttribute('url');

  // 2. <media:thumbnail> / <media:content> / <thumbnail>
  for (const tag of ['media\\:thumbnail','thumbnail','media\\:content']) {
    try {
      const u = item.querySelector(tag)?.getAttribute('url');
      if (u) return u;
    } catch {}
  }

  // 3. Bất kỳ [url] attribute trỏ tới ảnh
  for (const el of item.querySelectorAll('[url]')) {
    const u = el.getAttribute('url');
    if (u && /\.(jpg|jpeg|png|webp|gif)/i.test(u)) return u;
  }

  // 4. <img src="..."> trong description (Google News để ảnh ở đây)
  const descHtml = rawDesc || item.querySelector('description')?.textContent || '';
  const imgTag = descHtml.match(/<img[^>]+src=["']([^"']+)/i);
  if (imgTag) return imgTag[1];

  // 5. URL ảnh thô trong toàn bộ text item
  const fullText = item.textContent || '';
  const rawUrl = fullText.match(/https?:\/\/[^\s"'<>]+\.(jpg|jpeg|png|webp)(\?[^\s"'<>]*)?/i);
  if (rawUrl) return rawUrl[0];

  return '';
}

// ── SOURCE STATUS INDICATOR ──
function setSourceStatus(sourceId, status) {
  const el = document.getElementById(`src-status-${sourceId}`);
  if (!el) return;
  const map = { loading: '⟳', ok: '✓', error: '✕' };
  const col = { loading: 'var(--muted)', ok: 'var(--accent2)', error: 'var(--accent)' };
  el.textContent = map[status] || '';
  el.style.color = col[status] || '';
}

// ── FETCH ALL (stale-while-revalidate) ──
let _fetchAllRunning = false;

async function fetchAll(forceRefresh = false) {
  const enabled = state.sources.filter(s => s.enabled);
  if (!enabled.length) { toast('Không có nguồn nào được bật!'); return; }

  // Nếu đang fetch thì bỏ qua (tránh race condition)
  if (_fetchAllRunning && !forceRefresh) return;
  _fetchAllRunning = true;

  // Xoá cache nếu người dùng bấm Tải lại
  if (forceRefresh) {
    enabled.forEach(s => localStorage.removeItem(cacheKey(s.id)));
  }

  // Bước 1: hiện cache ngay lập tức nếu có → UX nhanh
  const cached = [];
  let allCached = true;
  enabled.forEach(s => {
    const c = readCache(s.id);
    if (c) cached.push(...c);
    else allCached = false;
  });

  if (cached.length > 0) {
    state.articles = cached;
    state.articles.forEach(a => { a.saved = state.saved.some(s => s.link === a.link); });
    renderFeed(); updateFilterStats();
  } else {
    showLoading();
  }

  // Bước 2: fetch thật song song, cập nhật dần khi từng source xong
  const freshArticlesMap = {};
  enabled.forEach(s => {
    const c = readCache(s.id);
    if (c) c.forEach(a => { freshArticlesMap[a.id] = a; });
  });

  let freshCount = 0;

  const promises = enabled.map(async s => {
    const c = readCache(s.id);
    if (c && !forceRefresh) return; // cache còn mới, bỏ qua

    const articles = await fetchSource(s);
    if (articles.length > 0) {
      // Xoá bài cũ của source này, thêm bài mới
      Object.keys(freshArticlesMap).forEach(k => {
        if (freshArticlesMap[k].sourceId === s.id) delete freshArticlesMap[k];
      });
      articles.forEach(a => { freshArticlesMap[a.id] = a; });
      freshCount++;

      // Cập nhật state và render ngay
      state.articles = Object.values(freshArticlesMap);
      state.articles.forEach(a => { a.saved = state.saved.some(sv => sv.link === a.link); });
      renderFeed(); updateFilterStats();
    }
  });

  await Promise.allSettled(promises);
  _fetchAllRunning = false;

  if (forceRefresh) {
    if (freshCount > 0) toast(`Đã cập nhật ${freshCount} nguồn`);
    else if (cached.length > 0) toast('Tin tức đã mới nhất');
    else toast('Không tải được tin — kiểm tra mạng');
  } else if (freshCount > 0) {
    toast(`Đã cập nhật ${freshCount} nguồn mới`);
  }
}

// ── FILTER ──
function shouldBlock(article) {
  if (!state.keywords.length) return false;
  const text = (article.title + ' ' + article.desc).toLowerCase();
  return state.keywords.some(kw => text.includes(kw.toLowerCase()));
}

function getFilteredArticles() {
  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';
  let articles = state.articles.filter(a => {
    if (state.activeSource !== 'all' && a.sourceId !== state.activeSource) return false;
    if (shouldBlock(a)) return false;
    if (search) {
      const text = (a.title + ' ' + a.desc).toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });
  const sort = document.getElementById('sort-select')?.value || 'date';
  if (sort === 'date') articles.sort((a,b) => b.pubDate - a.pubDate);
  else articles.sort((a,b) => a.sourceName.localeCompare(b.sourceName));
  return articles;
}

function updateFilterStats() {
  const blocked = state.articles.filter(a => shouldBlock(a)).length;
  state.blockedCount = blocked;
  const el = document.getElementById('filter-stats');
  if (!el) return;
  if (!state.keywords.length) { el.innerHTML = 'Chưa có từ khoá bị chặn'; return; }
  el.innerHTML = `Đã chặn <strong>${blocked}</strong> / ${state.articles.length} bài`;
}

// ── RENDER ──
function showLoading() {
  document.getElementById('feed').innerHTML = `<div class="loading-spinner"><div class="spinner"></div></div>`;
}

function switchView(view, btn) {
  state.currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const title = document.getElementById('feed-title');
  title.textContent = view === 'saved' ? 'Bài đã lưu' : 'Tin mới nhất';
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  let articles;
  if (state.currentView === 'saved') {
    articles = state.saved;
  } else {
    articles = getFilteredArticles();
  }

  if (!articles.length) {
    const msg = state.currentView === 'saved'
      ? '<h3>Chưa có bài lưu</h3><p>Bấm 🔖 trên bài viết để lưu lại đọc sau.</p>'
      : state.articles.length
        ? '<h3>Tất cả bị lọc</h3><p>Thử bỏ bớt từ khoá hoặc thay đổi bộ lọc.</p>'
        : '<h3>Chưa có bài nào</h3><p>Bấm <strong>Tải lại</strong> để lấy tin mới.</p>';
    feed.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';

  feed.innerHTML = articles.map((a, idx) => {
    const date = a.pubDate ? formatDate(a.pubDate) : '';
    const savedClass = (a.saved || state.saved.some(s => s.link === a.link)) ? 'saved' : '';
    const title = search ? highlight(a.title, search) : a.title;
    const desc = a.desc ? (search ? highlight(a.desc.slice(0,160), search) : a.desc.slice(0,160)) : '';
    const delay = (idx % 12) * 0.03;
    return `
      <div class="article-card" style="animation-delay:${delay}s" data-id="${a.id}">
        ${a.img
          ? `<img class="card-img" src="${a.img}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-img-placeholder">📰</div>`}
        <div class="card-body">
          <div class="card-source-row">
            <span class="card-source-badge" style="border-color:${a.sourceColor};color:${a.sourceColor}">${a.sourceName}</span>
            <span class="card-date">${date}</span>
          </div>
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc}…</div>` : ''}
          <div class="card-translated" id="tl-${a.id}" style="display:none"></div>
        </div>
        <div class="card-footer">
          <a href="${a.link}" target="_blank" rel="noopener">Đọc bài →</a>
          <button class="translate-btn" id="tlbtn-${a.id}" onclick="translateCard('${a.id}')" title="Dịch sang tiếng Việt">🌐</button>
          <button class="save-btn ${savedClass}" onclick="toggleSave('${a.id}')" title="${savedClass ? 'Bỏ lưu' : 'Lưu lại'}">🔖</button>
        </div>
      </div>`;
  }).join('');

  // Update source counts
  renderSources();
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark class="highlight">$1</mark>');
}

function formatDate(d) {
  if (!(d instanceof Date) || isNaN(d)) return '';
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
  if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
  return d.toLocaleDateString('vi-VN');
}

// ── SAVE ──
function toggleSave(id) {
  const article = state.articles.find(a => a.id === id);
  if (!article) return;
  const idx = state.saved.findIndex(s => s.link === article.link);
  if (idx >= 0) {
    state.saved.splice(idx, 1);
    article.saved = false;
    toast('Đã bỏ lưu bài viết');
  } else {
    article.saved = true;
    state.saved.unshift({...article});
    toast('Đã lưu bài viết 🔖');
  }
  save();
  renderFeed();
}

// ── SOURCES ──
function renderSources() {
  const container = document.getElementById('source-list');
  const allCount = getFilteredArticles().length;

  // update accordion badge
  const srcBadge = document.getElementById('acc-src-badge');
  if (srcBadge) srcBadge.textContent = state.sources.filter(s => s.enabled).length;

  let html = `<div class="source-item ${state.activeSource==='all'?'active':''}" onclick="setActiveSource('all')">
    <div class="source-left">
      <div class="source-dot" style="background:var(--ink)"></div>
      Tất cả
    </div>
    <span class="source-count">${allCount}</span>
  </div>`;

  state.sources.forEach(s => {
    const count = state.articles.filter(a => a.sourceId === s.id && !shouldBlock(a)).length;
    const active = state.activeSource === s.id;
    html += `<div class="source-item ${active?'active':''}" style="${!s.enabled?'opacity:.45':''}">
      <div class="source-left" onclick="setActiveSource('${s.id}')">
        <div class="source-dot" style="background:${s.color}"></div>
        ${s.name}
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <span id="src-status-${s.id}" style="font-size:11px;min-width:12px;text-align:center"></span>
        ${s.enabled ? `<span class="source-count">${count}</span>` : ''}
        <button onclick="toggleSource('${s.id}')" style="background:none;border:none;cursor:pointer;font-size:12px;opacity:.6" title="${s.enabled?'Tắt':'Bật'}">
          ${s.enabled ? '●' : '○'}
        </button>
        <button onclick="removeSource('${s.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:.4;color:var(--accent)" title="Xoá">×</button>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function setActiveSource(id) {
  state.activeSource = id;
  renderFeed();
}

function toggleSource(id) {
  const s = state.sources.find(s => s.id === id);
  if (s) { s.enabled = !s.enabled; save(); renderSources(); }
}

function removeSource(id) {
  state.sources = state.sources.filter(s => s.id !== id);
  state.articles = state.articles.filter(a => a.sourceId !== id);
  save(); renderFeed();
}

function addSource() {
  const name = document.getElementById('new-source-name').value.trim();
  const url = document.getElementById('new-source-url').value.trim();
  if (!name || !url) { toast('Vui lòng nhập tên và URL RSS'); return; }
  const colors = ['#8e44ad','#16a085','#d35400','#2980b9','#c0392b'];
  const color = colors[state.sources.length % colors.length];
  const id = 'src_' + Date.now();
  state.sources.push({ id, name, url, color, enabled: true });
  document.getElementById('new-source-name').value = '';
  document.getElementById('new-source-url').value = '';
  save(); renderSources();
  toast(`Đã thêm: ${name}`);
}

// ── KEYWORDS ──
function renderKeywords() {
  const container = document.getElementById('kw-tags');
  container.innerHTML = state.keywords.map(kw =>
    `<span class="keyword-tag">${kw}<span class="rm" onclick="removeKeyword('${kw}')">×</span></span>`
  ).join('');
  // update badge
  const badge = document.getElementById('acc-kw-badge');
  if (badge) {
    badge.style.display = state.keywords.length ? 'inline' : 'none';
    badge.textContent = state.keywords.length;
  }
}

function addKeyword() {
  const input = document.getElementById('kw-input');
  const kw = input.value.trim().toLowerCase();
  if (!kw) return;
  if (state.keywords.includes(kw)) { toast('Từ khoá đã tồn tại'); return; }
  state.keywords.push(kw);
  input.value = '';
  save(); renderKeywords(); updateFilterStats(); renderFeed();
  toast(`Đã chặn: "${kw}"`);
}

function removeKeyword(kw) {
  state.keywords = state.keywords.filter(k => k !== kw);
  save(); renderKeywords(); updateFilterStats(); renderFeed();
}

// ── EXPORT / IMPORT (gộp nguồn báo + từ khoá) ──
function exportAll() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    sources: state.sources.map(({ name, url, color, enabled }) => ({ name, url, color, enabled })),
    keywords: state.keywords,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `newsfilter-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast(`Đã xuất ${data.sources.length} nguồn + ${data.keywords.length} từ khoá`);
}

function importAll(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);

      let srcAdded = 0, srcSkipped = 0, kwAdded = 0;

      // Nhập nguồn báo
      if (Array.isArray(data.sources)) {
        const colors = ['#8e44ad','#16a085','#d35400','#2980b9','#c0392b','#e84118','#0097e6','#27ae60'];
        data.sources.forEach(item => {
          if (!item.name || !item.url) { srcSkipped++; return; }
          if (state.sources.some(s => s.url === item.url)) { srcSkipped++; return; }
          state.sources.push({
            id: 'src_' + Date.now() + '_' + srcAdded,
            name: item.name, url: item.url,
            color: item.color || colors[state.sources.length % colors.length],
            enabled: item.enabled !== false,
          });
          srcAdded++;
        });
      }

      // Nhập từ khoá
      if (Array.isArray(data.keywords)) {
        data.keywords.forEach(kw => {
          const k = String(kw).trim().toLowerCase();
          if (k && !state.keywords.includes(k)) { state.keywords.push(k); kwAdded++; }
        });
      }

      save(); renderSources(); renderKeywords(); updateFilterStats(); renderFeed();
      const parts = [];
      if (srcAdded)   parts.push(`${srcAdded} nguồn mới`);
      if (kwAdded)    parts.push(`${kwAdded} từ khoá mới`);
      if (srcSkipped) parts.push(`bỏ qua ${srcSkipped} nguồn trùng`);
      toast('Nhập: ' + (parts.join(', ') || 'không có gì mới'));
    } catch (err) {
      toast(`Lỗi đọc file: ${err.message}`);
    }
  };
  reader.readAsText(file);
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── THEME ──
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('nf_theme', dark ? 'dark' : 'light');
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDark);
}

// ── ACCORDION ──
function toggleAccordion(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── TRANSLATE ──
// Dùng Google Translate unofficial endpoint — miễn phí, không cần API key
// Chỉ dịch title + desc, không gọi khi đã dịch rồi
const translateCache = {}; // { articleId: { title, desc } }

async function translateCard(id) {
  const btn = document.getElementById(`tlbtn-${id}`);
  const box = document.getElementById(`tl-${id}`);
  if (!btn || !box) return;

  // Toggle: nếu đang hiện thì ẩn đi
  if (box.style.display !== 'none') {
    box.style.display = 'none';
    btn.textContent = '🌐';
    return;
  }

  // Nếu đã có cache thì hiện lại ngay
  if (translateCache[id]) {
    showTranslation(id, translateCache[id]);
    return;
  }

  // Tìm bài viết
  const article = [...state.articles, ...state.saved].find(a => a.id === id);
  if (!article) return;

  // Kiểm tra ngôn ngữ — chỉ dịch nếu không phải tiếng Việt
  const isVietnamese = /[àáạảãăắặẳẵâấậẩẫèéẹẻẽêếệểễìíịỉĩòóọỏõôốộổỗơớợởỡùúụủũưứựửữỳýỵỷỹđ]/i.test(article.title);
  if (isVietnamese) {
    toast('Bài này đã là tiếng Việt');
    return;
  }

  btn.textContent = '⟳';
  btn.classList.add('translating');

  try {
    const textToTranslate = [article.title, article.desc || ''].filter(Boolean).join('\n\n---\n\n');
    const translated = await googleTranslate(textToTranslate, 'vi');
    const parts = translated.split('\n\n---\n\n');
    const result = { title: parts[0] || '', desc: parts[1] || '' };
    translateCache[id] = result;
    showTranslation(id, result);
  } catch (e) {
    toast('Không dịch được — kiểm tra mạng');
    console.warn('Translate error:', e);
  } finally {
    btn.textContent = '🌐';
    btn.classList.remove('translating');
  }
}

function showTranslation(id, result) {
  const box = document.getElementById(`tl-${id}`);
  if (!box) return;
  box.innerHTML = `
    <span class="tl-label">🇻🇳 Bản dịch</span>
    <strong style="display:block;margin-bottom:4px;font-size:calc(var(--title-size)*0.85);line-height:1.3">${result.title}</strong>
    ${result.desc ? `<span>${result.desc}</span>` : ''}
  `;
  box.style.display = 'block';
  document.getElementById(`tlbtn-${id}`)?.setAttribute('title', 'Ẩn bản dịch');
}

async function googleTranslate(text, targetLang) {
  // Unofficial Google Translate endpoint
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  // Ghép các đoạn dịch lại
  return json[0].map(chunk => chunk[0]).join('');
}

// ── SCROLL TO TOP ──
function scrollToTop() {
  // Cuộn cả window lẫn #feed
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const feed = document.getElementById('feed');
  if (feed) feed.scrollTo({ top: 0, behavior: 'smooth' });
}

// Hiện nút khi cuộn xuống > 300px (theo dõi cả window + #feed)
function initScrollTop() {
  const btn = document.getElementById('scroll-top');
  if (!btn) return;
  const feed = document.getElementById('feed');
  const check = () => {
    const y = Math.max(window.scrollY, feed ? feed.scrollTop : 0);
    btn.classList.toggle('visible', y > 300);
  };
  window.addEventListener('scroll', check, { passive: true });
  if (feed) feed.addEventListener('scroll', check, { passive: true });
}

// ── INIT ──
function init() {
  // Áp dụng theme đã lưu, hoặc theo hệ điều hành
  const saved = localStorage.getItem('nf_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);

  // Xoá cache nếu đang dùng parser version cũ (không có img tốt)
  const PARSER_VER = 'v3';
  if (localStorage.getItem('nf_parser_ver') !== PARSER_VER) {
    Object.keys(localStorage)
      .filter(k => k.startsWith('nf_cache_'))
      .forEach(k => localStorage.removeItem(k));
    localStorage.setItem('nf_parser_ver', PARSER_VER);
  }
  renderSources();
  renderKeywords();
  updateFilterStats();
  updateWorkerBadge();
  initScrollTop();

  // Hiện cache cũ ngay lập tức (nếu có) → không thấy màn hình trắng
  const allStale = [];
  state.sources.filter(s => s.enabled).forEach(s => {
    const c = readStaleCache(s.id);
    if (c) allStale.push(...c);
  });

  if (allStale.length > 0) {
    state.articles = allStale;
    state.articles.forEach(a => { a.saved = state.saved.some(s => s.link === a.link); });
    renderFeed(); updateFilterStats();
  } else {
    document.getElementById('feed').innerHTML = `
      <div class="empty-state">
        <h3>Chào mừng đến NewsFilter 👋</h3>
        <p>Đang tải tin tức…</p>
      </div>`;
  }

  // Fetch mới nền (không forceRefresh — dùng cache nếu còn mới)
  fetchAll(false);

  // Auto-refresh mỗi 10 phút
  setInterval(() => fetchAll(false), 10 * 60 * 1000);
}

init();
</script>
